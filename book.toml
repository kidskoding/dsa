[book]
title = "Data Structures and Algorithms"
authors = []
language = "en"
src = "src"

[output.html]
mathjax-support = true
default-theme = "gruvbox"
git-repository-url = ""
preferred-dark-theme = "gruvbox"
additional-css = ["gruvbox/css/variables.css", "gruvbox/highlight.css", "custom.css"]
additional-js = ["gruvbox/gruvbox.js", "mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
