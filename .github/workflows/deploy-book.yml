name: deploy-book

# Builds the mdBook and publishes it to GitHub Pages.
# Enable once: repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Only the canonical template publishes the book — skipped on student copies.
    if: github.repository == 'kidskoding/dsa'
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: '0.5.3'
      MERMAID_VERSION: '0.17.0'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install mdBook
        run: |
          cargo install mdbook --version "${MDBOOK_VERSION}" --locked
      - name: Install mdbook-mermaid
        run: |
          cargo install mdbook-mermaid --version "${MERMAID_VERSION}" --locked
      - name: Build book
        run: mdbook build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
